<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time chat application">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="/static/site.webmanifest">
    <title>Chat App</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        .body-container {
            width: 100%;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background-color: aliceblue;
        }

        .container {
            width: 80%;
            max-width: 1000px;
            height: 60vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background-color: rgb(219, 226, 233);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
        }

        .left-container{
            width: 40%;
            height: 100%;
            background-color: rgb(219, 226, 233);
            display: flex;
            justify-content: center;
            align-items: center;

            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
        }

    </style>
</head>
<body>

    <div class="body-container">
        <div class="container">
            <div class="left-container">
                <h1 style="color: white;">Welcome to the Chat App</h1>
            </div>
            <div class="right-container">
                <div class="profile-container"></div>
                <div class="message-container"></div>
                <div class="input-container">
                    <div class="user-input-container">
                        <input type="text" class="user-input" id="user-input" placeholder="Type your message here...">
                    </div>
                    <div class="send-btn-container">
                        <button class="send-btn" onclick="console.log('Send clicked'); alert('Message sent!')">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log("Hello User!");
        alert("Hello User!");
    </script>
</body>
</html>
